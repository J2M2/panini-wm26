# Fly.io — create the app first: fly apps create <name>, then set app = "<name>" below.
# Deploy: fly deploy
# Create volume (once): fly volumes create panini_data --region <region> --size 1

app = "panini-wm26-replace-me"
primary_region = "iad"

[build]

[env]
  PANINI_DB_PATH = "/data/panini_wm26.sqlite"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "panini_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpus = 1
