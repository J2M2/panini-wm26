# Fly.io setup (one-time):
#   1. fly auth signup   (or: fly auth login)
#   2. fly apps create panini-wm26          (must match app = below, globally unique)
#   3. fly volumes create panini_data --region ams --size 1
#   4. fly secrets set PANINI_AUTH_SECRET="$(openssl rand -hex 32)"   # required for signed session cookies
#   Optional: fly secrets set PANINI_ADMIN_TOKEN="$(openssl rand -hex 24)"   # GET /admin/registry-users + X-Panini-Admin header
#   6. fly deploy
# After deploy your app is at https://panini-wm26.fly.dev

app = "panini-wm26"
primary_region = "ams"

[build]

[env]
  PANINI_DATA_DIR = "/data"
  PANINI_COOKIE_SECURE = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "panini_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpus = 1
